title: Soupify File Format & Operations Tutorial
version: "0.2.0"
audience: AI Systems

overview:
  purpose: >
    Soupify bundles multiple source files into a single markdown file for transmission to AI systems.
    Your role is to deserialize (desoupify) these files, perform requested tasks, and reserialize (resoupify) the results.
  workflow:
    - Receive a soupified (.soup or .md) file containing multiple source files.
    - Parse the block headers to reconstruct the original files.
    - Perform the requested tasks (analysis, modifications, debugging, etc.).
    - Resoupify only modified/new files back into a soup file.
    - Return the soup file so the user can desoupify to restore files locally.

soup_format_specification:
  description: >
    A soup file contains zero or more meta blocks (always first) followed by zero or more file blocks.
    Blocks concatenate directly — no blank lines between them.

  file_block_header:
    format: '#SOUP "<json_escaped_abs_path>" [#SOUP_PARTIAL_LINES <s>-<e>] #SOUPED_LINES <N> #SOUP_TRAILING_NEWLINE <0|1>'
    components:
      path: "Original absolute path, JSON-encoded (backslashes→\\\\, quotes→\\\"). Preserve exactly on resoupify."
      SOUP_PARTIAL_LINES: "Optional. Replaces only lines s–e (1-indexed, inclusive) of the existing file. Omit for full-file blocks."
      SOUPED_LINES: "Exact count of content lines immediately following this header."
      SOUP_TRAILING_NEWLINE: "1 = file ends with \\n, 0 = it does not. Serializer always writes 0 or 1; parser also accepts true/false."
    examples:
      - '#SOUP "/home/user/src/Button.tsx" #SOUPED_LINES 42 #SOUP_TRAILING_NEWLINE 1'
      - '#SOUP "/home/user/src/main.rs" #SOUP_PARTIAL_LINES 5-10 #SOUPED_LINES 6 #SOUP_TRAILING_NEWLINE 1'

  meta_block_header:
    description: >
      Generated by soupify -g. Always appears before file blocks. Parse N lines of content then SKIP —
      do not write to disk. Do not emit meta blocks yourself.
    format: '#SOUP_META "<label>" #SOUP_META_KIND <kind> #SOUP_META_FORMAT <fmt> #SOUP_META_LINES <N> #SOUP_META_READONLY <true|false>'
    example: '#SOUP_META "repo-graph" #SOUP_META_KIND codegraph #SOUP_META_FORMAT repomap #SOUP_META_LINES 120 #SOUP_META_READONLY true'

desoupify:
  description: Convert a soup file back into the original files.
  algorithm:
    - Scan for #SOUP_META or #SOUP header lines.
    - "Meta block: extract SOUP_META_LINES N, consume exactly N content lines, discard."
    - "File block: JSON-decode path, read optional partial range, N, trailing-newline flag; consume exactly N content lines."
    - "Full block (no partial range): join lines with \\n, append \\n if flag=1. Create parent dirs. Write to disk."
    - "Partial block: read target file as it currently exists on disk (reflecting any prior partial edits). Replace lines s–e (1-indexed) with block content. Write merged result back."
    - Repeat until all blocks are processed.
  implementation_notes:
    - 'Header regex: ^#SOUP ("(?:\\.|[^"\\])*")(?: #SOUP_PARTIAL_LINES ([0-9]+)-([0-9]+))? #SOUPED_LINES ([0-9]+) #SOUP_TRAILING_NEWLINE (0|1|true|false)$'
    - Create parent directories automatically (mkdir -p equivalent).
    - Partial blocks require the target file to exist and be long enough to cover end_line.
    - Multiple partial blocks on the same file apply in document order; each sees the result of the previous.

resoupify:
  description: "Convert modified files back into a soup file. Only emit files you modified or created."
  algorithm:
    - Identify all files modified or created during your work.
    - "For each file, choose full or partial output (see below), emit header then content."
    - Concatenate all blocks directly (no blank lines) into a .md output.

  full_block:
    use_when: Rewritten or new file.
    steps:
      - Read complete file content.
      - "Count lines: strip trailing \\n if present, split on \\n, count segments (empty → 0)."
      - "Emit: #SOUP \"<path>\" #SOUPED_LINES <N> #SOUP_TRAILING_NEWLINE <0|1> then all content lines."

  partial_block:
    use_when: Localized change in a large file — reduces output size significantly.
    steps:
      - Identify changed line range (1-indexed, inclusive).
      - "Emit: #SOUP \"<path>\" #SOUP_PARTIAL_LINES <s>-<e> #SOUPED_LINES <N> #SOUP_TRAILING_NEWLINE <0|1> then replacement lines only."
      - "Trailing-newline flag = the WHOLE file's state after the edit, not just the snippet."
      - "Multiple partial blocks on same file: line numbers in later blocks must account for changes introduced by earlier partial blocks."

  line_counting:
    rule: "Strip trailing \\n if present, split remainder on \\n, count segments. Empty string = 0."
    table:
      - { content: "(empty)",          lines: 0, trailing: 0 }
      - { content: "hello",            lines: 1, trailing: 0 }
      - { content: "hello\\n",         lines: 1, trailing: 1 }
      - { content: "a\\nb\\n",         lines: 2, trailing: 1 }
      - { content: "a\\nb",            lines: 2, trailing: 0 }
      - { content: "one\\n\\nthree\\n",lines: 3, trailing: 1 }

  implementation_notes:
    - Serialize trailing newline as 0 or 1 (never true/false).
    - JSON-escape file paths in headers.
    - Use absolute paths.
    - Do not re-emit unchanged files unless the user asks.
    - Do not emit #SOUP_META blocks.

practical_examples:
  two_files: |
    #SOUP "/tmp/src/main.rs" #SOUPED_LINES 3 #SOUP_TRAILING_NEWLINE 1
    fn main() {
        println!("Hello, world!");
    }
    #SOUP "/tmp/Cargo.toml" #SOUPED_LINES 2 #SOUP_TRAILING_NEWLINE 0
    [package]
    name = "hello"
  partial_edit: |
    #SOUP "/tmp/file.txt" #SOUP_PARTIAL_LINES 2-3 #SOUPED_LINES 2 #SOUP_TRAILING_NEWLINE 1
    dos
    tres
  with_meta_block: |
    #SOUP_META "repo-graph" #SOUP_META_KIND codegraph #SOUP_META_FORMAT repomap #SOUP_META_LINES 1 #SOUP_META_READONLY true
    <graph data — skip, do not write>
    #SOUP "/tmp/index.js" #SOUPED_LINES 1 #SOUP_TRAILING_NEWLINE 0
    console.log('hi');

error_handling:
  malformed_header: Report the line number and problematic content to the user.
  line_count_mismatch: Report expected vs. actual count and the affected file path.
  invalid_partial_range: "Report if start > end, either value is 0, or end exceeds existing file length."
  missing_metadata: Report which of SOUPED_LINES or SOUP_TRAILING_NEWLINE is absent and the affected path.

best_practices:
  - Validate soup block headers before consuming file content.
  - Track modifications carefully so you can resoupify accurately.
  - Line counts must be exact — off-by-one errors corrupt the soup file.
  - Handle the trailing newline flag correctly; it is essential for exact file restoration.
  - "Empty files: #SOUPED_LINES 0 #SOUP_TRAILING_NEWLINE 0, no content lines after the header."
  - Prefer partial blocks for large files with small changes to reduce output size.
  - Add any newly created files to the resoupified output even if they weren't in the original soup.
  - Do not emit #SOUP_META blocks — those are produced by the soupify CLI, not by AI.
  - If the user requests specific files, only resoupify those files.
