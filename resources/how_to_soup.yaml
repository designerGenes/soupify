soupify: v0.2.0
for: AI systems
purpose: >
  Soupify bundles source files into one markdown file for AI transmission.
  Parse it (desoupify), do the work, return edited files in soup format for local restoration.

file_block_header: '#SOUP "<json_path>" [#SOUP_PARTIAL_LINES <s>-<e>] #SOUPED_LINES <N> #SOUP_TRAILING_NEWLINE <0|1>'
meta_block_header: '#SOUP_META "<label>" #SOUP_META_KIND <kind> #SOUP_META_FORMAT <fmt> #SOUP_META_LINES <N> #SOUP_META_READONLY <true|false>'

fields:
  path: "Absolute path, JSON-encoded (backslashes→\\\\, quotes→\\\"). Preserve exactly."
  SOUP_PARTIAL_LINES: "Optional. Replace only lines s–e (1-indexed inclusive) of the existing file."
  SOUPED_LINES: "Exact count of content lines following the header."
  SOUP_TRAILING_NEWLINE: "1=file ends with newline, 0=it does not. Always serialize as 0 or 1."
  SOUP_META: "Generated by soupify -g. Parse N lines then skip — do not write to disk. Do not emit."

document_structure: "Zero or more meta blocks (first), then zero or more file blocks. Blocks concatenated directly, no separators."

desoupify:
  - Scan for #SOUP_META or #SOUP header lines.
  - "Meta block: consume SOUP_META_LINES N lines, discard."
  - "File block: JSON-decode path, read optional partial range, N, trailing-newline flag, consume N content lines."
  - "Full block: join lines with \\n, append \\n if flag=1, write to disk."
  - "Partial block: read target file (after any prior partial edits to it), replace lines s–e, write back."

resoupify:
  rule: Only emit files you modified or created.
  full_block: "Rewritten or new file. Strip trailing \\n, split on \\n, count (empty→0). Emit header then content."
  partial_block: "Small change in large file. Emit header with SOUP_PARTIAL_LINES then replacement lines only. Trailing-newline flag = whole-file state after edit."
  cascading_partials: "Multiple partial blocks on same file: line numbers in later blocks are relative to the file after all prior partial edits."

line_counting:
  rule: "Strip trailing newline if present, split on \\n, count segments. Empty string→0."
  table:
    - { content: "(empty)",        lines: 0, trailing: 0 }
    - { content: "hello",          lines: 1, trailing: 0 }
    - { content: "hello\n",        lines: 1, trailing: 1 }
    - { content: "a\nb\n",         lines: 2, trailing: 1 }
    - { content: "a\nb",           lines: 2, trailing: 0 }
    - { content: "one\n\nthree\n", lines: 3, trailing: 1 }

examples:
  two_files: |
    #SOUP "/src/main.rs" #SOUPED_LINES 3 #SOUP_TRAILING_NEWLINE 1
    fn main() {
        println!("Hi");
    }
    #SOUP "/Cargo.toml" #SOUPED_LINES 2 #SOUP_TRAILING_NEWLINE 0
    [package]
    name = "hello"
  with_meta: |
    #SOUP_META "repo-graph" #SOUP_META_KIND codegraph #SOUP_META_FORMAT repomap #SOUP_META_LINES 1 #SOUP_META_READONLY true
    <graph>
    #SOUP "/src/main.rs" #SOUPED_LINES 1 #SOUP_TRAILING_NEWLINE 1
    fn main() {}
  partial: |
    #SOUP "/file.txt" #SOUP_PARTIAL_LINES 2-3 #SOUPED_LINES 2 #SOUP_TRAILING_NEWLINE 1
    dos
    tres

critical_rules:
  - "Preserve absolute paths exactly; JSON-escape them."
  - "Line counts must be exact — off-by-one corrupts the file."
  - "Trailing newline: serialize as 0 or 1, never true/false."
  - "Empty files: SOUPED_LINES 0 SOUP_TRAILING_NEWLINE 0, no content lines."
  - "Do not emit SOUP_META blocks."
  - "Prefer partial blocks for large files with small changes."
